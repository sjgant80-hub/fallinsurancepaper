 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null

 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.1.0';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },

  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }

        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });

      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {

        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

const isoDate=ts=>{if(!ts)return '';const d=new Date(ts);return d.toISOString().slice(0,10)};
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){
 const buf=new TextEncoder().encode(s);
 const h=await crypto.subtle.digest('SHA-256',buf);
 return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// IDB
let db;
function openDB(){
 return new Promise((res,rej)=>{
 const r=indexedDB.open(STORE,1);
 r.onupgradeneeded=e=>{
 const d=e.target.result;
 ['firms','advisers','clients','policies','documents','templates','audit','state'].forEach(s=>{
 if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'});
 });
 };
 r.onsuccess=e=>{db=e.target.result;res(db)};
 r.onerror=rej;
 });
}
function idbGetAll(store){return new Promise(res=>{const tx=db.transaction(store,'readonly');const q=tx.objectStore(store).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(store,key){return new Promise(res=>{const tx=db.transaction(store,'readonly');const q=tx.objectStore(store).get(key);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(store,val,key){return new Promise(res=>{const tx=db.transaction(store,'readwrite');const o=tx.objectStore(store);const q=key!=null?o.put(val,key):o.put(val);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
function idbDel(store,key){return new Promise(res=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res(true)})}

async function loadAll(){
 if(!db)await openDB();
 const [firms,advisers,clients,policies,documents,templates,audit,uiState]=await Promise.all([
 idbGetAll('firms'),idbGetAll('advisers'),idbGetAll('clients'),idbGetAll('policies'),
 idbGetAll('documents'),idbGetAll('templates'),idbGetAll('audit'),idbGet('state','ui'),
 ]);
 state.firm=firms[0]||null;
 state.advisers=advisers; state.clients=clients; state.policies=policies; state.documents=documents;
 state.audit=audit.sort((a,b)=>a.i-b.i);
 state.templates=mergeTemplates(templates);
 if(uiState){
 state.ui=Object.assign({},state.ui,uiState.value||{});
 state.brandName=uiState.brand||'FallInsurancePaper';
 state.settings=Object.assign({},state.settings,uiState.settings||{});
 }
}
async function persistUI(){
 if(!db)await openDB();
 await idbPut('state',{value:state.ui,brand:state.brandName,settings:state.settings},'ui');
}

// audit (P3 extended)
async function audit(action,opts){
 opts=opts||{};
 if(!state.settings.auditChain)return;
 if(!db)await openDB();
 const prev=state.audit.length?state.audit[state.audit.length-1]:null;
 const prevHash=prev?prev.docHash:'';
 const i=(prev?prev.i:0)+1;
 const payload=opts.payload||{};
 const entry={
 id:uid('au'),i,ts:now(),tool:TOOLNAME,
 adviserId:opts.adviserId||state.ui.activeAdviserId||'',
 clientId:opts.clientId||'', policyId:opts.policyId||'',
 action, reasoning:opts.reasoning||'',
 configVersion:TOOLNAME+'@'+VERSION,
 prevHash, docHash:'', payload,
 };
 entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,clientId:entry.clientId,policyId:entry.policyId,prevHash,payload}));
 state.audit.push(entry);
 await idbPut('audit',entry);
}

// bundle mesh · fall-insurance + fall-signal
let bcIns,bcSignal;
let bcDebounce={};
function broadcast(channel,type,payload){
 if(!state.settings.autoBroadcast||!channel)return;
 try{channel.postMessage({v:1,type,ts:now(),source:TOOLNAME,payload})}catch(e){}
}
function debouncedBroadcast(key,channel,type,payload){
 clearTimeout(bcDebounce[key]);
 bcDebounce[key]=setTimeout(()=>broadcast(channel,type,payload),300);
}
async function initMesh(){
 try{
 bcSignal=new BroadcastChannel('fall-signal');
 bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()});
 bcSignal.addEventListener('message',e=>{const m=e.data;if(!m)return;if(m.type==='ping')bcSignal.postMessage({source:TOOLNAME,type:'pong',prime:PRIME})});
 }catch(e){}
 try{
 bcIns=new BroadcastChannel('fall-insurance');
 bcIns.addEventListener('message',handleBundleMessage);
 bcIns.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME,payload:{wants:['clients','advisers','firm','policies']}});
 }catch(e){}
}
async function handleBundleMessage(e){
 const m=e.data;if(!m||m.source===TOOLNAME)return;
 let dirty=false;
 const upsert=async(arrKey,store,rec)=>{
 if(!rec||!rec.id)return false;
 const arr=state[arrKey];
 const idx=arr.findIndex(x=>x.id===rec.id);
 const ex=idx>=0?arr[idx]:null;
 if(!ex||(rec.updatedAt||0)>=(ex.updatedAt||0)){
 if(idx>=0)arr[idx]=rec;else arr.push(rec);
 await idbPut(store,rec); return true;
 }
 return false;
 };
 if(m.type==='client.created'||m.type==='client.updated'||m.type==='client.archived'){
 if(await upsert('clients','clients',m.payload))dirty=true;
 }else if(m.type==='adviser.created'||m.type==='adviser.updated'){
 if(await upsert('advisers','advisers',m.payload))dirty=true;
 }else if(m.type==='firm.updated'){
 const f=m.payload;if(f){state.firm=f;await idbPut('firms',f);dirty=true}
 }else if(m.type==='policy.created'||m.type==='policy.updated'||m.type==='policy.lapsed'||m.type==='policy.claimed'||m.type==='policy.renewed'){
 if(await upsert('policies','policies',m.payload))dirty=true;
 }else if(m.type==='sync.request'){
 bcIns.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,
 payload:{clients:state.clients,advisers:state.advisers,firm:state.firm,policies:state.policies}});
 }else if(m.type==='sync.snapshot'){
 const p=m.payload||{};
 if(Array.isArray(p.clients))for(const c of p.clients)if(await upsert('clients','clients',c))dirty=true;
 if(Array.isArray(p.advisers))for(const a of p.advisers)if(await upsert('advisers','advisers',a))dirty=true;
 if(Array.isArray(p.policies))for(const pol of p.policies)if(await upsert('policies','policies',pol))dirty=true;
 if(p.firm&&(!state.firm||(p.firm.updatedAt||0)>(state.firm.updatedAt||0))){state.firm=p.firm;await idbPut('firms',p.firm);dirty=true}
 }
 if(dirty)render();
}
async function emitClientUpdate(c){debouncedBroadcast('client-'+c.id,bcIns,'client.updated',c)}
async function emitFirmUpdate(){if(state.firm)debouncedBroadcast('firm',bcIns,'firm.updated',state.firm)}
async function emitAdviserUpdate(a){debouncedBroadcast('adv-'+a.id,bcIns,'adviser.updated',a)}
async function emitPolicyUpdate(p){debouncedBroadcast('pol-'+p.id,bcIns,'policy.updated',p)}
async function emitDocCreated(doc){broadcast(bcIns,'document.created',doc)}

function mergeTemplates(saved){
 const map=new Map(saved.map(t=>[t.id,t]));
 return TEMPLATE_DEFS.map(def=>{
 const s=map.get(def.id);
 if(!s)return {...def};
 return {...def, sections:def.sections.map(sec=>{
 const over=s.sectionOverrides&&s.sectionOverrides[sec.id];
 return over?{...sec,text:over}:sec;
 })};
 });
}

function resolvePlaceholders(text,ctx){
 return text.replace(/\{\{(\w+)\}\}/g,(m,k)=>ctx[k]!=null?ctx[k]:m);
}

function renderPaperSection(sec,ctx,overrides){
 const raw=overrides&&overrides[sec.id]!=null?overrides[sec.id]:sec.text;
 const resolved=resolvePlaceholders(raw,ctx);
 let html='';
 const lines=resolved.split('\n');
 let inTable=false,tableHTML='';
 for(const line of lines){
 const trimmed=line.trim();
 if(trimmed.startsWith('|')&&trimmed.endsWith('|')){
 if(!inTable){inTable=true;tableHTML='<table>';}
 const cells=trimmed.slice(1,-1).split('|').map(c=>c.trim());
 if(cells.every(c=>/^-+$/.test(c))){continue;}
 const isHeader=!tableHTML.includes('<td');
 const tag=isHeader?'th':'td';
 tableHTML+='<tr>'+cells.map(c=>`<${tag}>${esc(c)}</${tag}>`).join('')+'</tr>';
 continue;
 }
 if(inTable){tableHTML+='</table>';html+=tableHTML;tableHTML='';inTable=false;}
 if(!trimmed){html+='<br>';continue;}
 if(trimmed.startsWith('**')&&trimmed.endsWith('**')){html+=`<h3>${esc(trimmed.slice(2,-2))}</h3>`;continue;}
 if(trimmed.startsWith('# ')){html+=`<h1>${esc(trimmed.slice(2))}</h1>`;continue;}
 if(trimmed.startsWith('## ')){html+=`<h2>${esc(trimmed.slice(3))}</h2>`;continue;}
 if(trimmed.startsWith('### ')){html+=`<h3>${esc(trimmed.slice(4))}</h3>`;continue;}
 if(trimmed.startsWith('---')){html+='<hr>';continue;}
 if(trimmed.startsWith('- [ ] ')){html+=`<p>&#9744; ${esc(trimmed.slice(6))}</p>`;continue;}
 if(trimmed.startsWith('- [x] ')){html+=`<p>&#9745; ${esc(trimmed.slice(6))}</p>`;continue;}
 if(trimmed.startsWith('- ')){html+=`<p style="padding-left:18px">&#8226; ${formatInline(trimmed.slice(2))}</p>`;continue;}
 if(/^\d+\.\s/.test(trimmed)){html+=`<p style="padding-left:18px">${formatInline(trimmed)}</p>`;continue;}
 if(trimmed.startsWith('_____')){html+='<div class="sig-line"></div>';continue;}
 html+=`<p>${formatInline(trimmed)}</p>`;
 }
 if(inTable){tableHTML+='</table>';html+=tableHTML;}
 if(sec.locked)html=`<div class="clause-locked">${html}</div>`;
 return html;
}

function formatInline(s){
 return esc(s)
 .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
 .replace(/\[([^\]]+)\]/g,'<span class="placeholder-empty">$1</span>');
}

function renderFullPaper(tplId,ctx,overrides){
 const tpl=TEMPLATE_DEFS.find(t=>t.id===tplId);
 if(!tpl)return '<p>Template not found.</p>';
 let html=`<h1>${esc(tpl.name)}</h1><div class="doc-meta">${esc(tpl.code)} &middot; generated ${ctx.today} &middot; ${esc(ctx.firmName)}</div>`;
 for(const sec of tpl.sections){
 html+=renderPaperSection(sec,ctx,overrides);
 }
 html+=`<hr><p style="font-size:10px;text-align:center;color:#6a5a40;font-family:var(--mono)">Generated by FallInsurancePaper &middot; prime 853 &middot; sovereign &middot; client data never leaves device</p>`;
 return html;
}

function newDocumentRec(tplId,clientId,policyId){
 return {
 id:uid('doc'),firmId:state.firm?state.firm.id:'',
 tplId, clientId:clientId||'', policyId:policyId||'',
 status:'draft', // draft | issued | signed
 title:'',
 sectionOverrides:{},
 createdAt:now(), updatedAt:now(), issuedAt:null, signedAt:null,
 adviserId:state.ui.activeAdviserId||'',
 notes:'',
 hash:'',
 };
}
async function saveDocumentRec(doc,action,reasoning){
 doc.updatedAt=now();
 const idx=state.documents.findIndex(d=>d.id===doc.id);
 if(idx>=0)state.documents[idx]=doc;else state.documents.push(doc);
 await idbPut('documents',doc);
 await audit(action||'document.saved',{clientId:doc.clientId,policyId:doc.policyId,reasoning:reasoning||'',payload:{docId:doc.id,tplId:doc.tplId,status:doc.status}});
 emitDocCreated(doc);
}
async function deleteDocumentRec(docId){
 state.documents=state.documents.filter(d=>d.id!==docId);
 await idbDel('documents',docId);
 await audit('document.deleted',{reasoning:'user deleted document',payload:{docId}});
}

async function verifyChain(){
 let ok=true;
 for(let i=0;i<state.audit.length;i++){
 const e=state.audit[i];
 const prevHash=i>0?state.audit[i-1].docHash:'';
 if(e.prevHash!==prevHash){ok=false;break;}
 const expected=await sha256(JSON.stringify({i:e.i,ts:e.ts,action:e.action,clientId:e.clientId,policyId:e.policyId,prevHash:e.prevHash,payload:e.payload}));
 if(e.docHash!==expected){ok=false;break;}
 }
 if(ok)toast('Chain integrity verified ✓');
 else toast('Chain broken — tampering detected');
}

const T0_RULES=[
 {q:/toba|terms of business/i,a:'A TOBA must be provided to the customer before any insurance is arranged (ICOBS 4.1). It must disclose your regulatory status, the basis on which you act (agent of the customer or insurer), your remuneration, complaints procedure, and client money handling under CASS 5. Use the TOBA template in this tool to generate a compliant version.'},
 {q:/demands?\s*(and|&)\s*needs?/i,a:'Under IDD Article 20 and ICOBS 5.2, before proposing a contract of insurance, the intermediary must specify — on the basis of information obtained from the customer — the demands and needs of that customer, and ensure the proposed product is consistent with those demands and needs. The D&N statement should be documented and retained for 6 years.'},
 {q:/ipid|product information/i,a:'The Insurance Product Information Document (IPID) is required by the IDD Implementing Regulation for non-life insurance. It must follow a standardised format covering: what the insurance is, what is/isn\'t covered, restrictions, obligations, payment terms, duration, and cancellation. The insurer produces the IPID; the broker must ensure it is provided to the customer before conclusion of the contract.'},
 {q:/cancel/i,a:'Consumer clients have a 14-day cooling-off period from inception (or 30 days for pure protection/payment protection policies) under ICOBS 7.1. During cooling-off, they are entitled to a full refund less any charge for cover already provided. After cooling-off, cancellation terms depend on the policy wording. Commercial clients have no statutory cooling-off right.'},
 {q:/complaint|disp|ombudsman/i,a:'Under DISP 1.6, you must acknowledge complaints promptly (within 5 business days) and issue a final response within 8 weeks. If unresolved, inform the customer of their right to refer to the Financial Ombudsman Service within 6 months of the final response. Use the Complaint Acknowledgement and Final Response templates. Retain all complaint records for at least 3 years (5 years for MiFID complaints).'},
 {q:/claim|notification/i,a:'Claims should be notified to the insurer as soon as reasonably practicable per the policy terms. The broker should assist with notification (ICOBS 8.1) and ensure the client understands their obligations (duty to mitigate, cooperation with loss adjusters, provision of evidence). Use the Claim Notification template to formally notify the insurer.'},
 {q:/client money|cass|trust/i,a:'Under CASS 5, client money must be held in a statutory trust account, segregated from the broker\'s own funds. Reconciliation must be performed monthly (CASS 5.5.63). Mixed payments must be split on the same business day. Premium must be remitted to insurers within the contractual timeline. Commission may only be withdrawn after cover confirmation. Document all movements.'},
 {q:/vulnerab/i,a:'FCA FG21/1 requires firms to have systems to identify vulnerable customers and respond appropriately. Vulnerability categories: health, life events, resilience, capability. Document the vulnerability, adjustments made, and communication preferences. Review at each material interaction. Use the Vulnerable Customer Note template to create a formal record.'},

 {q:/letter of authority|loa/i,a:'A Letter of Authority authorises the broker to act on behalf of the client with insurers and third parties. It should specify the scope of authority, the client\'s details, and the duration. LOAs are commonly used when taking over an account from another broker, or when dealing with insurers who require written authority before releasing information.'},
];

}

 parse:r=>r.candidates?.[0]?.content?.parts?.[0]?.text},
 {k:state.settings.openrouterKey,name:'OpenRouter',url:'https://openrouter.ai/api/v1/chat/completions',
 body:JSON.stringify({model:'meta-llama/llama-3-8b-instruct',max_tokens:800,messages:[{role:'system',content:'You are an expert UK insurance regulation assistant.'},{role:'user',content:q}]}),
 headers:{'Authorization':'Bearer KEY','Content-Type':'application/json'},
 parse:r=>r.choices?.[0]?.message?.content},
 ];
 for(const p of keys){
 if(!p.k)continue;
 try{
 const hdrs={};
 for(const[hk,hv]of Object.entries(p.headers))hdrs[hk]=hv.replace('KEY',p.k);
 const urlFinal=p.url.replace('KEY',p.k);
 const res=await fetch(urlFinal,{method:'POST',headers:hdrs,body:p.body});
 if(!res.ok)continue;
 const json=await res.json();
 const text=p.parse(json);
 if(text)return {answer:text,source:'T3 · '+p.name+' BYOK'};
 }catch(e){continue;}
 }
 return null;
}

function renderHelp(v){
 const msgs=state.ui.chat||[];
 v.innerHTML=`
 <div class="section-h"><h2>IDD Help</h2><div class="sub">T0 rules + T3 BYOK</div></div>
 <p style="font-size:12px;color:var(--cream-dim);margin-bottom:14px">Ask about TOBA, demands & needs, IPID, cancellation, complaints, claims, client money, vulnerability, mid-term adjustments, renewal, premium finance, or letters of authority. T0 answers from hard-coded FCA rules (free, instant). T3 falls back to your BYOK API key if T0 can't answer.</p>
 <div class="card" style="max-width:780px">
 <div class="chat" id="chatBox">
 ${msgs.map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}
 </div>
 <div class="chat-input">
 <input id="chatIn" placeholder="Ask about IDD, ICOBS, DISP, CASS…" onkeydown="if(event.key==='Enter')askQuestion()">
 <button class="btn primary" onclick="askQuestion()">Ask</button>
 </div>
 </div>
 `;
 const box=$('#chatBox');

}

async function askQuestion(){
 const inp=$('#chatIn');
 if(!inp)return;
 const q=inp.value.trim();
 if(!q)return;
 inp.value='';
 if(!state.ui.chat)state.ui.chat=[];
 state.ui.chat.push({role:'user',text:q});
 render();
 let result=askT0(q);
 if(!result){
 result=await askT3(q);
 }
 if(result){
 state.ui.chat.push({role:'bot',text:result.answer,source:result.source});
 }else{
 state.ui.chat.push({role:'bot',text:'No matching T0 rule found and no BYOK API key configured. Add a key in Settings to enable T3 answers.',source:'system'});
 }
 persistUI();render();
}

function exportState(){
 const payload={
 tool:TOOLNAME,version:VERSION,exportedAt:now(),
 firm:state.firm,advisers:state.advisers,clients:state.clients,
 policies:state.policies,documents:state.documents,
 brandName:state.brandName,settings:{auditChain:state.settings.auditChain,autoBroadcast:state.settings.autoBroadcast},
 };
 const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');a.href=url;a.download=`fallinsurancepaper-export-${isoDate(now())}.json`;a.click();
 URL.revokeObjectURL(url);toast('Exported');
}

function importState(){
 const inp=document.createElement('input');inp.type='file';inp.accept='.json';
 inp.onchange=async()=>{
 const file=inp.files[0];if(!file)return;
 try{
 const text=await file.text();
 const data=JSON.parse(text);
 if(data.firm){state.firm=data.firm;await idbPut('firms',data.firm);}
 if(Array.isArray(data.advisers))for(const a of data.advisers){state.advisers.push(a);await idbPut('advisers',a);}
 if(Array.isArray(data.clients))for(const c of data.clients){state.clients.push(c);await idbPut('clients',c);}
 if(Array.isArray(data.policies))for(const p of data.policies){state.policies.push(p);await idbPut('policies',p);}
 if(Array.isArray(data.documents))for(const d of data.documents){state.documents.push(d);await idbPut('documents',d);}
 if(data.brandName)state.brandName=data.brandName;
 await persistUI();
 toast('Imported');render();
 }catch(e){toast('Import failed: '+e.message);}
 };
 inp.click();
}

async function wipeState(){
 if(!confirm('Wipe ALL data from this device? This cannot be undone.'))return;
 if(!confirm('Are you absolutely sure? All clients, policies, documents, and audit entries will be deleted.'))return;
 const stores=['firms','advisers','clients','policies','documents','templates','audit','state'];
 for(const s of stores){
 const tx=db.transaction(s,'readwrite');
 tx.objectStore(s).clear();
 await new Promise(r=>{tx.oncomplete=r;});
 }
 localStorage.removeItem(STORE);
 state={active:'dashboard',brandName:'FallInsurancePaper',firm:null,advisers:[],clients:[],policies:[],documents:[],templates:[],audit:[],
 ui:{selectedClientId:null,selectedPolicyId:null,selectedTemplateId:'toba',selectedDocumentId:null,activeAdviserId:null,libFilterClient:'',libFilterPolicy:'',libFilterTpl:'',libFilterStatus:'',sectionOverrides:{},extraContext:{},chat:[]},
 settings:{anthropicKey:'',auditChain:true,autoBroadcast:true},_editingClientId:null,_editingAdvId:null,_editingPolicyId:null};
 toast('Device wiped');render();
}
